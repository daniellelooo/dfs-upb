server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: namenode
  datasource:
    url: jdbc:h2:file:${DATA_DIR:./data}/namenode-db;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate.dialect: org.hibernate.dialect.H2Dialect
      hibernate.format_sql: false
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

dfs:
  block-size-mb: ${BLOCK_SIZE_MB:64}
  replication-factor: ${REPLICATION_FACTOR:2}
  jwt-secret: ${JWT_SECRET:please-change-this-secret-please-change-this-secret}
  jwt-expiration-hours: ${JWT_EXPIRATION_HOURS:24}
  heartbeat-suspect-seconds: ${HB_SUSPECT_SECONDS:10}
  heartbeat-dead-seconds: ${HB_DEAD_SECONDS:30}
  rereplication-interval-seconds: ${REREPL_INTERVAL_SECONDS:15}

logging:
  level:
    root: INFO
    com.upb.dfs: INFO
